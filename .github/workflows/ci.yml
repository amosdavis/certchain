name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: go mod download
        run: go mod download

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          args: --timeout=5m

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2024.1.1

      - name: staticcheck
        run: staticcheck ./...

  bdd:
    name: BDD features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: build binaries
        run: make build

      - name: run BDD
        run: make bdd

  dependency-audit:
    name: dependency audit (CM-28)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: cache module download
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-audit-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gomod-audit-
            ${{ runner.os }}-gomod-

      - name: go mod download
        run: go mod download

      - name: verify go.sum is in sync with go.mod
        run: go mod verify

      - name: go mod tidy -diff (fail on drift)
        run: go mod tidy -diff

      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2024.1.1

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: make audit
        run: make audit GO=go STATICCHECK=staticcheck

      - name: govulncheck (HIGH/CRITICAL gate)
        # Default govulncheck behavior: non-zero exit on any reachable vuln.
        # This step is redundant with `make audit` but is kept separate so
        # the CI UI shows a clearly-named step when vulns are found.
        run: govulncheck ./...
