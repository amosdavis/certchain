apiVersion: apps/v1
kind: Deployment
metadata:
  name: annotation-ctrl
  namespace: certchain
  labels:
    app: annotation-ctrl
spec:
  # Single replica with leader election (CM-22). HA via leader election;
  # workload is not HA-critical so no multi-replica deployment.
  replicas: 1
  selector:
    matchLabels:
      app: annotation-ctrl
  template:
    metadata:
      labels:
        app: annotation-ctrl
    spec:
      serviceAccountName: annotation-ctrl
      automountServiceAccountToken: true
      # Pod-level securityContext (CM-31): run as an unprivileged, non-root
      # UID/GID and constrain the syscall surface via RuntimeDefault seccomp.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        fsGroup: 10002
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: annotation-ctrl
        image: your-registry/annotation-ctrl:latest
        # Container-level securityContext (CM-31): drop every Linux capability,
        # forbid privilege escalation, and make the root filesystem read-only.
        # Any writable path the process needs must be backed by an explicit
        # emptyDir tmpfs volume below.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10002
          runAsGroup: 10002
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        args:
        - "--health-addr=:8082"
        - "--metrics-addr=:9880"
        - "--certd-url=http://certchain-query.certchain.svc.cluster.local:9879"
        - "--query-token-file=/var/run/secrets/certd-token/token"
        - "--log-format=json"
        - "--log-level=info"
        env:
        # Explicit JSON logging for structured log aggregation
        - name: LOG_FORMAT
          value: "json"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - name: health
          containerPort: 8082
          protocol: TCP
        - name: metrics
          containerPort: 9880
          protocol: TCP
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: token
          mountPath: /var/run/secrets/certd-token
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      # Writable scratch space required by the Go runtime when
      # readOnlyRootFilesystem is true (CM-31). Backed by tmpfs so the
      # contents never touch persistent storage.
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 16Mi
      # Bearer token for certd query API (CM-28). Mounted from a Secret
      # that operators must create before deploying annotation-ctrl.
      - name: token
        secret:
          secretName: annotation-ctrl-token
          optional: false
