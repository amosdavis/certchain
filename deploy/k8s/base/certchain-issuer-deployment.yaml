apiVersion: apps/v1
kind: Deployment
metadata:
  name: certchain-issuer
  namespace: certchain
  labels:
    app: certchain-issuer
spec:
  # Two replicas for HA (CM-20, CM-21). Leader election ensures only one
  # replica processes CertificateRequests at a time.
  replicas: 2
  selector:
    matchLabels:
      app: certchain-issuer
  template:
    metadata:
      labels:
        app: certchain-issuer
    spec:
      serviceAccountName: certchain-issuer
      automountServiceAccountToken: true
      # Pod-level securityContext (CM-31): run as an unprivileged, non-root
      # UID/GID and constrain the syscall surface via RuntimeDefault seccomp.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: certchain-issuer
        image: your-registry/certchain-issuer:latest
        # Container-level securityContext (CM-31): drop every Linux capability,
        # forbid privilege escalation, and make the root filesystem read-only.
        # Any writable path the process needs must be backed by an explicit
        # emptyDir tmpfs volume below.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        args:
        - "--health-addr=:8081"
        - "--reconnect-delay=5s"
        ports:
        - name: health
          containerPort: 8081
          protocol: TCP
        - name: metrics
          containerPort: 9880
          protocol: TCP
        - name: webhook
          containerPort: 9443
          protocol: TCP
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      # Writable scratch space required by the Go runtime / TLS cert parsing
      # when readOnlyRootFilesystem is true (CM-31). Backed by tmpfs so the
      # contents never touch persistent storage.
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 16Mi
