# Example: How a GKE application gets a TLS certificate from certchain
#
# Prerequisites:
#   1. cert-manager installed:
#      kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   2. certchain CRDs installed:
#      kubectl apply -f deploy/k8s/base/crds.yaml
#   3. certchain-issuer running:
#      kubectl apply -f deploy/k8s/base/certchain-issuer-rbac.yaml
#      kubectl apply -f deploy/k8s/base/certchain-issuer-deployment.yaml
#   4. certd running with --k8s-enabled and matching --k8s-signer-name
#
# Step 1: Create the ClusterIssuer (one-time, cluster-admin)
---
apiVersion: certchain.io/v1alpha1
kind: CertchainClusterIssuer
metadata:
  name: appviewx
spec:
  # Must match certd's --k8s-signer-name flag.
  signerName: certchain.io/appviewx
---
# Step 2: In your app's namespace, create a Certificate resource.
#
# cert-manager will:
#   a. Generate a private key and store it in secretName as tls.key
#   b. Create a CertificateRequest → certchain-issuer creates a K8s CSR
#   c. certd CSR watcher submits to AVX, gets cert, writes back
#   d. cert-manager stores the cert in secretName as tls.crt
#   e. Automatically renews 30 days before expiry (renewBefore)
#
# Replace "my-app" with your actual app namespace.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: my-app-tls
  namespace: my-app        # <-- your app's namespace
spec:
  secretName: my-app-tls   # Secret cert-manager creates in this namespace
  duration: 8760h           # 1 year
  renewBefore: 720h         # Renew 30 days before expiry (CM-21: must be ≥30d)
  dnsNames:
  - my-app.example.com      # Must match what AVX will issue
  - www.my-app.example.com
  issuerRef:
    group: certchain.io
    kind: CertchainClusterIssuer
    name: appviewx
---
# Step 3: Mount the Secret in your Pod.
#
# The Secret "my-app-tls" in namespace "my-app" will contain:
#   tls.crt — PEM-encoded signed certificate chain
#   tls.key — PEM-encoded private key (generated by cert-manager, never leaves cluster)
#
# Example Pod volume mount:
#
# spec:
#   volumes:
#   - name: tls
#     secret:
#       secretName: my-app-tls
#   containers:
#   - name: my-app
#     volumeMounts:
#     - name: tls
#       mountPath: /etc/tls
#       readOnly: true
#     env:
#     - name: TLS_CERT_FILE
#       value: /etc/tls/tls.crt
#     - name: TLS_KEY_FILE
#       value: /etc/tls/tls.key
#
# For a namespace-scoped issuer (restricts issuance to one namespace):
#
# apiVersion: certchain.io/v1alpha1
# kind: CertchainIssuer
# metadata:
#   name: appviewx
#   namespace: my-app
# spec:
#   signerName: certchain.io/appviewx
#
# Then in the Certificate: issuerRef.kind: CertchainIssuer
