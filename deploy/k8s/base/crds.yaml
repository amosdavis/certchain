---
# CertchainClusterIssuer — cluster-scoped issuer resource.
# Cert-manager CertificateRequest objects that reference this via
# issuerRef.kind=CertchainClusterIssuer and issuerRef.group=certchain.io
# will be fulfilled by the certchain-issuer controller.
#
# See spec/FAILURES.md tenet CM-26: CRDs without strict OpenAPI v3 validation
# silently accept malformed specs which surface as runtime reconcile errors.
# All object schemas below set additionalProperties: false and pin types,
# patterns, and enums so the API server rejects malformed resources at
# admission time.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certchainclusterissuers.certchain.io
spec:
  group: certchain.io
  names:
    kind: CertchainClusterIssuer
    listKind: CertchainClusterIssuerList
    plural: certchainclusterissuers
    singular: certchainclusterissuer
    shortNames: ["ccli"]
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Ready
      type: string
      jsonPath: .status.conditions[?(@.type=="Ready")].status
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        type: object
        description: >
          CertchainClusterIssuer configures a cluster-scoped cert-manager
          external issuer fulfilled by certchain-issuer.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            additionalProperties: false
            properties:
              signerName:
                type: string
                description: >
                  The K8s CertificateSigningRequest signerName certchain-issuer
                  will use. Must match the --k8s-signer-name flag on certd and
                  must be in the certchain.io/ namespace.
                minLength: 14
                maxLength: 253
                pattern: '^certchain\.io/[A-Za-z0-9]([A-Za-z0-9._-]{0,251}[A-Za-z0-9])?$'
                default: "certchain.io/appviewx"
          status:
            type: object
            additionalProperties: false
            properties:
              conditions:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required: [type, status]
                  properties:
                    type:
                      type: string
                      minLength: 1
                      maxLength: 316
                      pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$'
                    status:
                      type: string
                      enum: ["True", "False", "Unknown"]
                    reason:
                      type: string
                      maxLength: 1024
                    message:
                      type: string
                      maxLength: 32768
                    observedGeneration:
                      type: integer
                      format: int64
                      minimum: 0
                    lastTransitionTime:
                      type: string
                      format: date-time
