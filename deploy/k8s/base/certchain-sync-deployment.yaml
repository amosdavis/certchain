apiVersion: apps/v1
kind: Deployment
metadata:
  name: certchain-sync
  namespace: certchain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certchain-sync
  template:
    metadata:
      labels:
        app: certchain-sync
    spec:
      serviceAccountName: certchain-sync
      # Pod-level securityContext (CM-31): unprivileged UID/GID + RuntimeDefault
      # seccomp so the pod conforms to the namespace's restricted PodSecurity
      # profile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: certchain-sync
        image: your-registry/certchain:latest
        # Container-level securityContext (CM-31): drop all caps, read-only
        # root FS, no privilege escalation. Writable paths come from the tmp
        # tmpfs volume below.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        command: ["/usr/local/bin/certchain-sync"]
        args:
        - --certd-url=http://certchain-query.certchain.svc.cluster.local:9879
        - --listen=:8080
        - --reconcile-interval=5m
        # Set --namespaces to restrict which namespaces receive TLS Secrets.
        # Leave unset to sync into all namespaces.
        # - --namespaces=default,production
        ports:
        - name: webhook
          containerPort: 8080
        - name: metrics
          containerPort: 9880
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 30
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: certchain-sync
  namespace: certchain
spec:
  selector:
    app: certchain-sync
  ports:
  - name: webhook
    port: 8080
    targetPort: 8080
