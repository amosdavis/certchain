apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: certchain
  namespace: certchain
spec:
  serviceName: certchain-headless
  replicas: 1
  selector:
    matchLabels:
      app: certchain
  template:
    metadata:
      labels:
        app: certchain
    spec:
      # Pod-level securityContext (CM-31): unprivileged UID/GID + fsGroup so
      # the PVC mounted below is writable to the certd process, and
      # RuntimeDefault seccomp so the pod passes the namespace's restricted
      # PodSecurity admission profile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: certd
        image: your-registry/certchain:latest
        # Container-level securityContext (CM-31): drop every capability,
        # forbid privilege escalation, and make the root filesystem read-only.
        # Writable paths are the /data/certchain PVC (via volumeClaimTemplates)
        # and the /tmp tmpfs emptyDir below.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        # All configuration is driven by env vars; see cluster-a/configmap.yaml
        # and cluster-a/secret.yaml. certd falls back to env vars when flags are
        # not set (AVX_URL, AVX_KEY, NOTIFY_URL, STATIC_PEERS).
        args: ["--config", "/data/certchain"]
        env:
        - name: STATIC_PEERS
          valueFrom:
            configMapKeyRef:
              name: certchain-config
              key: STATIC_PEERS
        - name: NOTIFY_URL
          valueFrom:
            configMapKeyRef:
              name: certchain-config
              key: NOTIFY_URL
        # AVX credentials are optional — absent on secondary (sync-only) clusters.
        - name: AVX_URL
          valueFrom:
            secretKeyRef:
              name: certchain-avx
              key: AVX_URL
              optional: true
        - name: AVX_KEY
          valueFrom:
            secretKeyRef:
              name: certchain-avx
              key: AVX_KEY
              optional: true
        - name: K8S_ENABLED
          valueFrom:
            configMapKeyRef:
              name: certchain-config
              key: K8S_ENABLED
              optional: true
        - name: K8S_NAMESPACE
          valueFrom:
            configMapKeyRef:
              name: certchain-config
              key: K8S_NAMESPACE
              optional: true
        - name: K8S_SECRET_PREFIX
          valueFrom:
            configMapKeyRef:
              name: certchain-config
              key: K8S_SECRET_PREFIX
              optional: true
        - name: K8S_SIGNER_NAME
          valueFrom:
            configMapKeyRef:
              name: certchain-config
              key: K8S_SIGNER_NAME
              optional: true
        ports:
        - name: query
          containerPort: 9879
          protocol: TCP
        - name: sync
          containerPort: 9878
          protocol: TCP
        - name: metrics
          containerPort: 9880
          protocol: TCP
        - name: discovery
          containerPort: 9876
          protocol: UDP
        volumeMounts:
        - name: certchain-data
          mountPath: /data/certchain
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /status
            port: 9879
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /status
            port: 9879
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      # tmpfs-backed scratch space required because readOnlyRootFilesystem is
      # true (CM-31). Keep small; real certd state lives on the PVC below.
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 32Mi
  volumeClaimTemplates:
  - metadata:
      name: certchain-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
