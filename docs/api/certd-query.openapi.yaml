openapi: 3.0.3
info:
  title: certchain certd Query API
  description: |
    HTTP query API for the certchain certd daemon. Provides certificate 
    metadata, chain status, and DER/key retrieval endpoints.
    
    Authenticated endpoints require a Bearer token (configured via 
    `--query-token-file` or `CERTD_QUERY_TOKEN`). Health/readiness probes 
    and metrics are always unauthenticated.
  version: 1.0.0
  contact:
    name: certchain project
    url: https://github.com/amosdavis/certchain

servers:
  - url: http://localhost:9879
    description: Default certd query API listener

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      summary: Health check
      description: Liveness probe. Returns 200 OK when the process is alive.
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: Process is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /readyz:
    get:
      summary: Readiness probe
      description: |
        Returns 200 when the node is ready to serve traffic (chain loaded, 
        optional leader acquired). Returns 503 when not ready. See CM-27.
      operationId: getReadyz
      security: []
      responses:
        '200':
          description: Node is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyzResponse'
              example:
                leader: disabled
                chain: loaded
        '503':
          description: Node is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyzResponse'
              example:
                leader: disabled
                chain: loading

  /metrics:
    get:
      summary: Prometheus metrics
      description: Prometheus-format metrics including chain and AVX counters.
      operationId: getMetrics
      security: []
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP certchain_chain_height Current blockchain height
                  # TYPE certchain_chain_height gauge
                  certchain_chain_height 42

  /status:
    get:
      summary: Chain status
      description: Returns chain height, active peer count, and certificate count.
      operationId: getStatus
      responses:
        '200':
          description: Status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cert:
    get:
      summary: Get certificate by CN or ID
      description: |
        Retrieve certificate metadata by Common Name (`cn` parameter) or 
        cert ID (`id` parameter, 64-char hex). Exactly one parameter is required.
      operationId: getCert
      parameters:
        - name: cn
          in: query
          description: Certificate Common Name (hostname)
          required: false
          schema:
            type: string
            example: api.example.com
        - name: id
          in: query
          description: Certificate ID (64-character hex string)
          required: false
          schema:
            type: string
            pattern: '^[0-9a-f]{64}$'
            example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      responses:
        '200':
          description: Certificate metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertResponse'
        '400':
          description: Invalid request (missing or malformed query parameter)
          content:
            text/plain:
              schema:
                type: string
              examples:
                missingParam:
                  value: "query parameter 'cn' or 'id' required"
                invalidHex:
                  value: "invalid cert_id hex"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Certificate not found
          content:
            text/plain:
              schema:
                type: string
                example: cert not found

  /cert/list:
    get:
      summary: List certificates
      description: |
        Returns a paginated list of all active certificates. Default page 
        size is 50, maximum is 200.
      operationId: listCerts
      parameters:
        - name: page
          in: query
          description: Page number (1-indexed)
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            example: 1
        - name: limit
          in: query
          description: Results per page (max 200)
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
            example: 50
      responses:
        '200':
          description: Paginated certificate list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cert/{certId}/der:
    get:
      summary: Get certificate DER bytes
      description: |
        Returns the raw DER-encoded certificate. If not cached locally, 
        certd attempts to fetch from peers. Content-Type is `application/pkix-cert`.
      operationId: getCertDER
      parameters:
        - name: certId
          in: path
          description: Certificate ID (64-character hex string)
          required: true
          schema:
            type: string
            pattern: '^[0-9a-f]{64}$'
            example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      responses:
        '200':
          description: DER-encoded certificate
          content:
            application/pkix-cert:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid cert_id hex
          content:
            text/plain:
              schema:
                type: string
                example: invalid cert_id hex
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Certificate or DER not available
          content:
            text/plain:
              schema:
                type: string
              examples:
                certNotFound:
                  value: cert not found
                derNotCached:
                  value: DER not cached on this node

  /cert/{certId}/key:
    get:
      summary: Get private key
      description: |
        Returns the PEM-encoded private key for the certificate. 
        **WARNING:** This endpoint serves private key material; restrict 
        access via NetworkPolicy in production.
      operationId: getCertKey
      parameters:
        - name: certId
          in: path
          description: Certificate ID (64-character hex string)
          required: true
          schema:
            type: string
            pattern: '^[0-9a-f]{64}$'
            example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      responses:
        '200':
          description: PEM-encoded private key
          content:
            application/x-pem-file:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid cert_id hex
          content:
            text/plain:
              schema:
                type: string
                example: invalid cert_id hex
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Certificate or key not available
          content:
            text/plain:
              schema:
                type: string
              examples:
                certNotFound:
                  value: cert not found
                keyNotAvailable:
                  value: key not available for this cert

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token configured via `--query-token-file`, `--query-token`, 
        or `CERTD_QUERY_TOKEN` environment variable. When unconfigured, 
        auth is disabled (dev mode).

  schemas:
    ReadyzResponse:
      type: object
      required:
        - leader
        - chain
      properties:
        leader:
          type: string
          enum:
            - disabled
            - ok
            - not_acquired
          description: Leader election status (disabled when no leader election)
        chain:
          type: string
          enum:
            - loading
            - loaded
          description: Chain load status
      example:
        leader: disabled
        chain: loaded

    StatusResponse:
      type: object
      required:
        - chain_height
        - peer_count
        - cert_count
      properties:
        chain_height:
          type: integer
          description: Current blockchain height
          example: 42
        peer_count:
          type: integer
          description: Number of active peers
          example: 3
        cert_count:
          type: integer
          description: Number of certificates in the store
          example: 17
      example:
        chain_height: 42
        peer_count: 3
        cert_count: 17

    CertResponse:
      type: object
      required:
        - cert_id
        - cn
        - avx_cert_id
        - not_before
        - not_after
        - sans
        - serial
        - status
        - block_height
      properties:
        cert_id:
          type: string
          description: Certificate ID (64-character hex SHA-256)
          pattern: '^[0-9a-f]{64}$'
          example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
        cn:
          type: string
          description: Certificate Common Name
          example: api.example.com
        avx_cert_id:
          type: string
          description: AppViewX certificate ID
          example: "12345"
        not_before:
          type: integer
          format: int64
          description: Validity start (Unix epoch seconds)
          example: 1704067200
        not_after:
          type: integer
          format: int64
          description: Validity end (Unix epoch seconds)
          example: 1735689600
        sans:
          type: array
          items:
            type: string
          description: Subject Alternative Names
          example:
            - api.example.com
            - www.example.com
        serial:
          type: string
          description: Certificate serial number
          example: "01:23:45:67:89:AB:CD:EF"
        status:
          type: string
          description: Certificate status
          enum:
            - active
            - revoked
            - expired
          example: active
        block_height:
          type: integer
          format: uint32
          description: Blockchain height where this cert was committed
          example: 15
      example:
        cert_id: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
        cn: api.example.com
        avx_cert_id: "12345"
        not_before: 1704067200
        not_after: 1735689600
        sans:
          - api.example.com
          - www.example.com
        serial: "01:23:45:67:89:AB:CD:EF"
        status: active
        block_height: 15

    CertListResponse:
      type: object
      required:
        - total
        - page
        - limit
        - certs
      properties:
        total:
          type: integer
          description: Total number of certificates
          example: 123
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Results per page
          example: 50
        certs:
          type: array
          items:
            $ref: '#/components/schemas/CertResponse'
      example:
        total: 123
        page: 1
        limit: 50
        certs:
          - cert_id: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
            cn: api.example.com
            avx_cert_id: "12345"
            not_before: 1704067200
            not_after: 1735689600
            sans:
              - api.example.com
              - www.example.com
            serial: "01:23:45:67:89:AB:CD:EF"
            status: active
            block_height: 15

  responses:
    Unauthorized:
      description: Missing or invalid Bearer token
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: Bearer realm="certchain"
      content:
        text/plain:
          schema:
            type: string
            example: unauthorized
